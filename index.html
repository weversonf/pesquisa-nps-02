<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel NPS - Makro Engenharia v05</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #010816; color: #f1f5f9; margin: 0; }
        .tv-mode-bg { background-color: #e9eef3 !important; color: #333 !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #ED1C24; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }
        
        .tv-sidebar { width: 450px; background: white; height: 100vh; position: relative; padding: 4rem; display: flex; flex-direction: column; justify-content: center; box-shadow: 10px 0 30px rgba(0,0,0,0.05); z-index: 10; }
        .tv-sidebar-accent { position: absolute; left: 0; top: 0; width: 40px; height: 100%; background: #011f42; }
        .tv-main-content { flex: 1; padding: 3rem; background: #e9eef3; display: flex; flex-direction: column; gap: 2rem; position: relative; }
        .tv-table-container { background: #d1d9e0; border-radius: 40px; padding: 2.5rem; flex: 1; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, ReferenceLine } = window.Recharts;

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwcsfpw1_uglhD6JtF4jAvjJ4hqgnHTcgKL8CBtb_i6pRmck7POOBvuqYykjIIE9sLdyQ/exec';

        const COLORS = {
            critica: '#EF4136',
            aperfeicoamento: '#FDB913',
            qualidade: '#56C174',
            excelencia: '#00A650'
        };

        const getNPSColor = (score) => {
            if (score >= 75) return COLORS.excelencia;
            if (score >= 50) return COLORS.qualidade;
            if (score >= 0) return COLORS.aperfeicoamento;
            return COLORS.critica;
        };

        const parseDate = (dateStr) => {
            if (!dateStr) return new Date(0);
            const parts = dateStr.split(' ');
            if (parts.length < 2) return new Date(0);
            const mes = parts[0];
            const anoStr = parts[1];
            const meses = { 'Jan': 0, 'Fev': 1, 'Mar': 2, 'Abr': 3, 'Mai': 4, 'Jun': 5, 'Jul': 6, 'Ago': 7, 'Set': 8, 'Out': 9, 'Nov': 10, 'Dez': 11 };
            let ano = parseInt(anoStr);
            if (ano < 100) ano += 2000;
            return new Date(ano, meses[mes] || 0, 1);
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    const lucideName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                    i.setAttribute('data-lucide', lucideName);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({
                        attrs: { width: size, height: size, class: className, 'stroke-width': 2 }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center leading-none text-white"></span>;
        };

        const Gauge = ({ value, label, sublabel, color, max = 100, min = -100 }) => {
            const percentage = ((value - min) / (max - min)) * 100;
            const rotation = -90 + (percentage * 1.8);
            return (
                <div className="bg-white rounded-[30px] p-6 shadow-sm flex flex-col items-center justify-center w-full max-w-[320px]">
                    <div className="relative w-48 h-28 overflow-hidden">
                        <svg className="w-full h-full" viewBox="0 0 200 110">
                            <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="#eee" strokeWidth="24" strokeLinecap="round" />
                            <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke={color} strokeWidth="24" strokeLinecap="round" 
                                  strokeDasharray="251" strokeDashoffset={251 - (251 * (Math.max(0, Math.min(100, percentage)) / 100))} style={{ transition: 'all 1s ease' }} />
                            <rect x="98" y="40" width="4" height="60" rx="2" fill="#333" 
                                  style={{ transformOrigin: '100px 100px', transform: `rotate(${rotation}deg)`, transition: 'all 1s ease' }} />
                            <circle cx="100" cy="100" r="6" fill="#333" />
                        </svg>
                    </div>
                    <div className="text-center mt-2">
                        <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest">{label}</p>
                        <p className="text-2xl font-black text-gray-800">{value}{sublabel}</p>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [loading, setLoading] = useState(false);
            const [user, setUser] = useState(null);
            const [data, setData] = useState([]);
            const [usersList, setUsersList] = useState([]);
            const [contractsList, setContractsList] = useState([]);
            const [tvSlide, setTvSlide] = useState(0); 
            
            // Estados de Filtro
            const [filters, setFilters] = useState({ unidade: 'Todas', cliente: 'Todos', contrato: 'Todos' });
            const [selectedMonths, setSelectedMonths] = useState([]);
            const [isPeriodDropdownOpen, setIsPeriodDropdownOpen] = useState(false);
            const [expandedYears, setExpandedYears] = useState({});
            
            const [editingLogin, setEditingLogin] = useState(null);
            const [newUser, setNewUser] = useState({ nome: '', email: '', tipo: 'Usuario', permissoes: '' });
            const [surveyData, setSurveyData] = useState({ mesReferente: 'Mar 26', contrato: '', numContrato: '', cliente: '', nota: null, feedback: '' });

            // 1. Organização Hierárquica do Período (2020 - 2026)
            const periodHierarchy = useMemo(() => {
                const hierarchy = {};
                const uniqueMonths = [...new Set(data.map(d => d.mes))].filter(Boolean);
                
                uniqueMonths.forEach(m => {
                    const d = parseDate(m);
                    const year = d.getFullYear();
                    if (!hierarchy[year]) hierarchy[year] = [];
                    hierarchy[year].push({ label: m, date: d });
                });

                return Object.keys(hierarchy).sort((a, b) => b - a).map(year => ({
                    year,
                    months: hierarchy[year].sort((a, b) => a.date - b.date).map(x => x.label)
                }));
            }, [data]);

            const handleLogin = async (e) => {
                if (e) e.preventDefault();
                const u = document.getElementById('li').value;
                const p = document.getElementById('lp').value;
                setLoading(true);
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=login&user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`).then(r => r.json());
                    if (res.result === "success") {
                        setUser({ nome: res.nome, email: res.email, tipo: res.tipo });
                        const rawData = res.metrics?.baseDados || [];
                        setData(rawData);
                        setUsersList(res.admData || []);
                        setContractsList(res.metrics?.listaContratos || []);
                        
                        const unique = [...new Set(rawData.map(d => d.mes))].filter(Boolean);
                        setSelectedMonths(unique);
                        
                        setView('dashboard');
                    } else { alert("Login inválido."); }
                } catch (e) { alert("Erro de conexão."); }
                setLoading(false);
            };

            // 2. Funções de Seleção
            const toggleYearSelection = (year, months) => {
                const allSelected = months.every(m => selectedMonths.includes(m));
                if (allSelected) {
                    setSelectedMonths(prev => prev.filter(m => !months.includes(m)));
                } else {
                    setSelectedMonths(prev => [...new Set([...prev, ...months])]);
                }
            };

            const toggleMonth = (mes) => {
                setSelectedMonths(prev => 
                    prev.includes(mes) ? prev.filter(m => m !== mes) : [...prev, mes]
                );
            };

            const stats = useMemo(() => {
                const filtered = data.filter(d => {
                    return selectedMonths.includes(d.mes) &&
                           (filters.unidade === 'Todas' || d.unidade === filters.unidade) &&
                           (filters.cliente === 'Todos' || d.cliente === filters.cliente) &&
                           (filters.contrato === 'Todos' || d.contrato === filters.contrato);
                });
                const total = filtered.length;
                const p = filtered.filter(x => x.nota >= 9).length;
                const det = filtered.filter(x => x.nota <= 6).length;
                const nps = total > 0 ? Math.round(((p - det) / total) * 100) : 0;
                return { total, p, det, nps, neutros: total - p - det, filtered };
            }, [data, filters, selectedMonths]);

            const monthlyNpsData = useMemo(() => {
                const currentMonths = [...new Set(stats.filtered.map(r => r.mes))].sort((a, b) => parseDate(a) - parseDate(b));
                return currentMonths.map(m => {
                    const dMes = stats.filtered.filter(x => x.mes === m); 
                    const p = dMes.filter(x => x.nota >= 9).length;
                    const det = dMes.filter(x => x.nota <= 6).length;
                    const nps = dMes.length > 0 ? Math.round(((p - det) / dMes.length) * 100) : 0;
                    return { mes: m, score: nps };
                });
            }, [stats.filtered]);

            useEffect(() => {
                if (view === 'tv') {
                    const interval = setInterval(() => setTvSlide(s => (s === 0 ? 1 : 0)), 15000);
                    return () => clearInterval(interval);
                }
            }, [view]);

            if (view === 'tv') {
                const isClientSlide = tvSlide === 0;
                return (
                    <div className="h-screen w-screen tv-mode-bg flex animate-fadeIn overflow-hidden">
                        <div className="tv-sidebar shadow-2xl">
                            <div className="tv-sidebar-accent"></div>
                            <div className="space-y-4">
                                <p className="text-[#023F88] font-black text-xl uppercase tracking-[4px]">NPS</p>
                                <h1 className="text-[#023F88] text-5xl font-black leading-[0.95] uppercase">
                                    NOTA NPS<br/>DE <span className="text-[#011f42]">{selectedMonths.length === [...new Set(data.map(d=>d.mes))].length ? 'GERAL' : 'FILTRADO'}</span>
                                    <br/>POR <span className="text-[#011f42]">{isClientSlide ? 'CLIENTE' : 'UNIDADE'}</span>
                                </h1>
                                <p className="text-gray-400 text-[12px] font-bold mt-12">Atualizado {new Date().toLocaleDateString()}</p>
                            </div>
                        </div>
                        <div className="tv-main-content">
                            <div className="absolute top-10 right-14 text-right opacity-40 text-[11px] font-black tracking-[4px] text-gray-600 uppercase">Engenharia<br/>de Movimentação</div>
                            <div className="flex justify-center gap-12 mt-4">
                                <Gauge label="Índice NPS" value={stats.nps} color={getNPSColor(stats.nps)} />
                                <Gauge label="Taxa de Resposta" sublabel="%" value={83} color={COLORS.excelencia} />
                            </div>
                            <div className="tv-table-container">
                                <table className="w-full">
                                    <thead>
                                        <tr className="border-b-2 border-gray-400/30 text-gray-600 text-[13px] font-black uppercase tracking-widest">
                                            <th className="pb-4 text-left">{isClientSlide ? 'CLIENTE' : 'UNIDADE'}</th>
                                            <th className="pb-4 text-right">SCORE NPS</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-gray-700">
                                        {(isClientSlide ? [...new Set(stats.filtered.map(d => d.cliente))] : [...new Set(stats.filtered.map(d => d.unidade))])
                                            .slice(0, 7).map((item, idx) => {
                                                const dItem = stats.filtered.filter(x => (isClientSlide ? x.cliente : x.unidade) === item);
                                                const p = dItem.filter(x => x.nota >= 9).length;
                                                const det = dItem.filter(x => x.nota <= 6).length;
                                                const score = Math.round(((p - det) / dItem.length) * 100);
                                                return (
                                                    <tr key={idx} className="border-b border-gray-400/20">
                                                        <td className="py-4 font-bold uppercase text-lg">{item}</td>
                                                        <td className="py-4 text-right font-black text-2xl" style={{ color: getNPSColor(score) }}>{score}</td>
                                                    </tr>
                                                );
                                            })}
                                    </tbody>
                                </table>
                            </div>
                            <div className="flex justify-end mt-auto">
                                <img src="https://makroengenharia.com.br/wp-content/uploads/2023/03/logo-1.png" className="h-16 brightness-50 opacity-30" />
                                <button onClick={() => setView('dashboard')} className="fixed bottom-4 left-4 opacity-0 hover:opacity-100 p-2 bg-black text-white text-[10px] rounded">Sair TV</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col animate-fadeIn">
                    <header className="p-6 flex flex-col items-center border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-50 text-center">
                        <img src="https://makroengenharia.com.br/wp-content/uploads/2023/03/logo-1.png" className="h-12 mb-2" />
                        <span className="text-[10px] tracking-[6px] font-bold opacity-40 uppercase">Painel NPS | Makro Engenharia</span>
                    </header>

                    <main className="flex-1 p-6 md:p-12 max-w-7xl mx-auto w-full">
                        {loading && <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center"><div className="w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div></div>}

                        {view === 'login' && (
                            <div className="flex flex-col items-center justify-center mt-20">
                                <form onSubmit={handleLogin} className="w-full max-w-md bg-white/5 p-12 rounded-[40px] border border-white/10 shadow-2xl backdrop-blur-xl">
                                    <h2 className="text-3xl font-black mb-8 text-center uppercase tracking-tighter">Makro Engenharia</h2>
                                    <input className="w-full bg-white/10 p-5 rounded-2xl mb-4 outline-none border border-white/10 focus:ring-2 ring-red-600 transition-all text-white" placeholder="E-mail" id="li" required />
                                    <input className="w-full bg-white/10 p-5 rounded-2xl mb-8 outline-none border border-white/10 focus:ring-2 ring-red-600 transition-all text-white" type="password" placeholder="Senha" id="lp" required />
                                    <button type="submit" className="w-full bg-red-600 p-5 rounded-2xl font-black uppercase hover:bg-red-700 shadow-xl shadow-red-600/20 active:scale-95 transition-all">Acessar</button>
                                </form>
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="space-y-8">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 text-white">
                                    <div>
                                        <h2 className="text-[10px] font-bold opacity-40 uppercase tracking-[4px]">{user?.tipo}</h2>
                                        <p className="text-3xl font-black uppercase tracking-tight">{user?.nome}</p>
                                    </div>
                                    <div className="flex gap-2">
                                        {(user?.tipo === 'Usuario' || user?.tipo === 'ADM MASTER') && (
                                            <button onClick={() => setView('survey')} className="px-6 py-4 bg-red-600/10 text-red-500 border border-red-600/20 rounded-2xl font-black text-[11px] uppercase flex items-center gap-3 hover:bg-red-600/20 transition-all">
                                                <Icon name="PlusCircle" size={16} /> AVALIAR
                                            </button>
                                        )}
                                        {user?.tipo === 'ADM MASTER' && (
                                            <button onClick={() => setView('tv')} className="p-4 bg-white/5 rounded-2xl border border-white/10 hover:bg-blue-600/20 transition-all" title="Apresentação">
                                                <Icon name="Monitor" />
                                            </button>
                                        )}
                                        <button onClick={() => window.location.reload()} className="p-4 bg-white/5 rounded-2xl border border-white/10 hover:text-red-500 transition-all" title="Sair">
                                            <Icon name="LogOut" />
                                        </button>
                                    </div>
                                </div>

                                {/* FILTROS HIERÁRQUICOS */}
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 bg-white/5 p-8 rounded-[40px] border border-white/10 shadow-xl relative z-40">
                                    <div className="relative">
                                        <label className="text-[10px] font-bold opacity-30 uppercase ml-2 mb-2 block tracking-widest text-white">Período</label>
                                        <button 
                                            onClick={() => setIsPeriodDropdownOpen(!isPeriodDropdownOpen)} 
                                            className="w-full bg-[#010816] border border-white/10 p-4 rounded-2xl text-xs text-white text-left flex justify-between items-center hover:bg-white/10 transition"
                                        >
                                            <span className="truncate">{selectedMonths.length === [...new Set(data.map(d=>d.mes))].length ? 'Todo o Período' : `${selectedMonths.length} Meses`}</span>
                                            <Icon name="ChevronDown" size={16} className={isPeriodDropdownOpen ? "rotate-180" : ""} />
                                        </button>
                                        
                                        {isPeriodDropdownOpen && (
                                            <div className="absolute top-full left-0 w-full mt-2 bg-[#010816] border border-white/10 rounded-2xl shadow-2xl z-[60] max-h-96 overflow-y-auto p-4 custom-scrollbar animate-fadeIn">
                                                <div className="mb-4 border-b border-white/10 pb-2 flex justify-between">
                                                    <button onClick={() => setSelectedMonths([...new Set(data.map(d=>d.mes))])} className="text-[10px] font-black text-blue-400 hover:text-white uppercase tracking-tighter">Selecionar Tudo</button>
                                                    <button onClick={() => setSelectedMonths([])} className="text-[10px] font-black text-red-500 hover:text-white uppercase tracking-tighter">Limpar</button>
                                                </div>
                                                
                                                {periodHierarchy.map(item => (
                                                    <div key={item.year} className="mb-2">
                                                        <div className="flex items-center justify-between p-2 hover:bg-white/5 rounded-xl cursor-pointer group">
                                                            <div className="flex items-center gap-3 flex-1" onClick={() => toggleYearSelection(item.year, item.months)}>
                                                                <div className={`w-4 h-4 rounded border flex items-center justify-center ${item.months.every(m => selectedMonths.includes(m)) ? 'bg-green-600 border-green-600' : 'border-white/20'}`}>
                                                                    {item.months.every(m => selectedMonths.includes(m)) && <Icon name="Check" size={10}/>}
                                                                </div>
                                                                <span className="text-sm font-black text-white">{item.year}</span>
                                                            </div>
                                                            <button onClick={(e) => { e.stopPropagation(); setExpandedYears(prev => ({ ...prev, [item.year]: !prev[item.year] })); }} className="p-1 opacity-40 group-hover:opacity-100 text-white">
                                                                <Icon name={expandedYears[item.year] ? "ChevronUp" : "ChevronDown"} size={14} />
                                                            </button>
                                                        </div>
                                                        {expandedYears[item.year] && (
                                                            <div className="ml-6 mt-1 space-y-1 border-l border-white/10 pl-2">
                                                                {item.months.map(m => (
                                                                    <div key={m} onClick={() => toggleMonth(m)} className="flex items-center gap-3 p-2 hover:bg-white/5 rounded-lg cursor-pointer transition text-white">
                                                                        <div className={`w-3.5 h-3.5 rounded border flex items-center justify-center ${selectedMonths.includes(m) ? 'bg-blue-600 border-blue-600' : 'border-white/10'}`}>
                                                                            {selectedMonths.includes(m) && <Icon name="Check" size={8}/>}
                                                                        </div>
                                                                        <span className="text-[11px] font-medium uppercase tracking-tight">{m.split(' ')[0]}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    {['Unidade', 'Cliente', 'Contrato'].map(f => (
                                        <div key={f}>
                                            <label className="text-[10px] font-bold opacity-30 uppercase ml-2 mb-2 block tracking-widest text-white">{f}</label>
                                            <select 
                                                className="w-full bg-[#010816] border border-white/10 p-4 rounded-2xl outline-none text-xs text-white hover:bg-white/10 transition"
                                                value={filters[f.toLowerCase()]} 
                                                onChange={e => setFilters({...filters, [f.toLowerCase()]: e.target.value})}
                                            >
                                                <option value={f === 'Unidade' ? 'Todas' : 'Todos'}>Todos</option>
                                                {[...new Set(data.map(d => d[f.toLowerCase()]))].filter(Boolean).sort().map(v => <option key={v} value={v}>{v}</option>)}
                                            </select>
                                        </div>
                                    ))}
                                </div>

                                {/* CARDS NPS */}
                                <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                    {[
                                        { l: 'Total Respostas', v: stats.total, c: 'white' },
                                        { l: 'Promotores', v: stats.p, c: COLORS.excelencia },
                                        { l: 'Neutros', v: stats.neutros, c: COLORS.aperfeicoamento },
                                        { l: 'Detratores', v: stats.det, c: COLORS.critica },
                                        { l: 'Índice NPS', v: stats.nps, c: getNPSColor(stats.nps), highlight: true }
                                    ].map((s, i) => (
                                        <div key={i} className={`p-8 rounded-[40px] border ${s.highlight ? 'bg-white/10 border-white/30' : 'bg-white/5 border-white/10'} text-center shadow-lg`}>
                                            <span className="text-[11px] font-black opacity-40 uppercase block mb-2 tracking-widest text-white">{s.l}</span>
                                            <span className="text-4xl font-black" style={{ color: s.c }}>{s.v}</span>
                                        </div>
                                    ))}
                                </div>

                                {/* GRÁFICO NPS MENSAL */}
                                <div className="bg-white/5 p-10 rounded-[40px] border border-white/10 h-[450px] shadow-2xl">
                                    <div className="mb-6 flex justify-between items-center text-white">
                                        <h4 className="text-xs font-black uppercase opacity-40 tracking-widest">Desempenho NPS Mensal</h4>
                                        <div className="flex gap-4 text-[9px] font-black uppercase">
                                            <span style={{color: COLORS.excelencia}}>● Excelência</span>
                                            <span style={{color: COLORS.qualidade}}>● Qualidade</span>
                                            <span style={{color: COLORS.aperfeicoamento}}>● Aperfeiçoamento</span>
                                            <span style={{color: COLORS.critica}}>● Crítica</span>
                                        </div>
                                    </div>
                                    <ResponsiveContainer width="100%" height="90%">
                                        <BarChart data={monthlyNpsData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#ffffff05" />
                                            <XAxis dataKey="mes" stroke="#ffffff30" fontSize={10} />
                                            <YAxis stroke="#ffffff30" fontSize={10} domain={[-100, 100]} ticks={[-100, -50, 0, 50, 75, 100]} />
                                            <Tooltip cursor={{fill: 'rgba(255,255,255,0.03)'}} contentStyle={{ background: '#010816', border: '1px solid #ffffff10', borderRadius: '15px' }} />
                                            <ReferenceLine y={0} stroke="#ffffff20" />
                                            <Bar dataKey="score" radius={[10, 10, 0, 0]}>
                                                {monthlyNpsData.map((e, i) => <Cell key={i} fill={getNPSColor(e.score)} />)}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="p-10 text-center opacity-20 text-[10px] font-black uppercase tracking-[8px] text-white">
                        MAKRO ENGENHARIA | BRAND HUB
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
